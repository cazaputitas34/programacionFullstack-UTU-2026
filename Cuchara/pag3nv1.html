<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gartic Phone</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .wallpaper { border: 1px solid black; padding: 40px; min-height: 100vh; }
        .main { border: 1px solid black; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .logo { border: 1px solid black; padding: 30px 40px; margin: 0 auto; width: fit-content; }
        .caja { border: 1px solid black; padding: 10px; margin: 5px; }
        .grid2 { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin: 10px 0; }
        .content { border: 1px solid black; padding: 80px 20px; }
    </style>
</head>
<body>

<div class="wallpaper">
    <main class="main">

        <div class="top-bar">
            <button>&lt;button&gt; linguagem</button>
            <div class="logo">logotipo</div>
            <div class="caja">&lt;div&gt; Conecte-se</div>
        </div>

        <div class="grid2">
            <div class="content">&lt;div&gt; configuração do usuário</div>
            <div class="content">&lt;div&gt; &lt;figure&gt; como jogar</div>
        </div>

        <footer class="caja" ALIGN="center">&lt;footer&gt; informações</footer>

    </main>
</div>
</body>
</html>
